name: Release Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  ext: ''     }
          - { goos: linux,   goarch: arm64,  ext: ''     }
          - { goos: darwin,  goarch: amd64,  ext: ''     }
          - { goos: darwin,  goarch: arm64,  ext: ''     }
          - { goos: windows, goarch: amd64,  ext: '.exe' }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA::7}"
          OUT="region-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w \
            -X github.com/dnahilman/region.id/internal/version.Version=${VERSION} \
            -X github.com/dnahilman/region.id/internal/version.Commit=${COMMIT}" \
            -o "$OUT" ./cmd/region
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: region-${{ matrix.goos }}-${{ matrix.goarch }}
          path: region-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: region-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: region-*
          generate_release_notes: true
